services:
  postgres:
    image: postgres:15-alpine
    container_name: eventping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventping
      POSTGRES_USER: eventping
      POSTGRES_PASSWORD: eventping_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventping -d eventping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
