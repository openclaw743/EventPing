services:
  postgres:
    image: postgres:15-alpine
    container_name: eventping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventping
      POSTGRES_USER: eventping
      POSTGRES_PASSWORD: eventping_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventping -d eventping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://eventping:eventping_dev@postgres:5432/eventping
      JWT_SECRET: dev-jwt-secret-change-in-production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/callback
      FRONTEND_URL: http://localhost:5173
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
